<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc Nghiệm Tin Học A</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;
  --white:#fff;
  --s2:#f8fafc;
  --bd:#e2e8f0;
  --bd2:#cbd5e1;
  --tx:#1e293b;
  --tx2:#475569;
  --tx3:#94a3b8;
  --ac:#3b6ff5;
  --ac-bg:#eff4ff;
  --gr:#16a34a;--gr-bg:#f0fdf4;--gr-bd:#bbf7d0;
  --re:#dc2626;--re-bg:#fef2f2;--re-bd:#fecaca;
  --ye:#d97706;--ye-bg:#fffbeb;
  --or:#ea580c;--or-bg:#fff7ed;--or-bd:#fed7aa;
  --pu:#7c3aed;--pu-bg:#f5f3ff;--pu-bd:#ddd6fe;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6}
.wrap{max-width:880px;margin:0 auto;padding:20px 16px 80px}

/* ── HEADER ── */
.ph{text-align:center;padding:22px 0 16px}
.ph h1{font-size:clamp(20px,5vw,28px);font-weight:800;color:var(--tx);margin-bottom:5px;letter-spacing:-.5px}
.ph p{font-size:13px;color:var(--tx2)}
.ph-stats{display:inline-flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:10px;background:var(--white);border:1px solid var(--bd);border-radius:100px;padding:6px 18px;font-size:12px;color:var(--tx2)}
.ph-stats strong{color:var(--ac);font-weight:700}

/* ── MODE TABS ── */
.mode-tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:2px solid var(--bd);padding-bottom:0}
.tab{padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--tx2);font-family:'Nunito',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;border-radius:8px 8px 0 0;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--tx);background:var(--s2)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);background:var(--white)}
.tab.hard-tab.on{color:var(--pu);border-bottom-color:var(--pu)}
.tab-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:100px;margin-left:2px}
.tab.on .tab-badge-normal{background:var(--ac-bg);color:var(--ac)}
.tab.hard-tab.on .tab-badge-hard{background:var(--pu-bg);color:var(--pu)}
.tab-badge-normal,.tab-badge-hard{background:var(--s2);color:var(--tx3)}
.tab.on .tab-badge-normal{background:var(--ac-bg);color:var(--ac)}
.tab.hard-tab.on .tab-badge-hard{background:var(--pu-bg);color:var(--pu)}

/* ── PANEL ── */
.panel{display:none}.panel.on{display:block}

/* ── CTRL BAR ── */
.cb{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.cb-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.cb-row:last-child{margin-bottom:0}
.cb-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);white-space:nowrap}
.chips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.chip{padding:4px 13px;border-radius:100px;border:1.5px solid var(--bd2);background:var(--white);color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif;white-space:nowrap}
.chip:hover{border-color:var(--ac);color:var(--ac)}
.chip.on{background:var(--ac);border-color:var(--ac);color:#fff}
.chip-all.on{background:var(--tx);border-color:var(--tx);color:#fff}
.cnt-row{display:flex;gap:5px}
.cnt{padding:4px 13px;border-radius:100px;border:1.5px solid var(--bd2);background:var(--white);color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
.cnt:hover{border-color:var(--ac);color:var(--ac)}
.cnt.on{background:var(--ac);border-color:var(--ac);color:#fff}
.mix{display:flex;align-items:center;gap:6px;padding:4px 13px;border-radius:100px;border:1.5px solid var(--bd2);background:var(--white);color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
.mix:hover{border-color:var(--ac);color:var(--ac)}
.mix.on{background:var(--gr-bg);border-color:var(--gr);color:var(--gr)}
.mix-dot{width:6px;height:6px;border-radius:50%;background:var(--bd2);transition:background .15s}
.mix.on .mix-dot{background:var(--gr)}

/* Hard panel ctrl */
.hcb{background:var(--white);border:1px solid var(--pu-bd);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(124,58,237,.06)}
.hard-notice{background:var(--pu-bg);border:1px solid var(--pu-bd);border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12.5px;color:#4c1d95;display:flex;gap:8px;align-items:flex-start;line-height:1.55}
.hn-ico{font-size:14px;flex-shrink:0;margin-top:1px}

/* ── START ROW ── */
.sr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sbtn{padding:9px 24px;border-radius:100px;border:none;background:var(--ac);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 2px 8px rgba(59,111,245,.28);transition:all .15s}
.sbtn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(59,111,245,.38)}
.sbtn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.sbtn-hard{background:linear-gradient(135deg,#7c3aed,#9d4edd)}
.sbtn-hard:hover{box-shadow:0 4px 14px rgba(124,58,237,.4)!important}
.av{font-size:12px;color:var(--tx2)}.av strong{color:var(--tx)}

/* ── STICKY PROGRESS ── */
.sp{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--bd);padding:7px 0;display:none;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sp.show{display:block}
.sp-in{max-width:880px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px}
.sp-txt{font-size:12px;color:var(--tx2);white-space:nowrap}
.sp-txt strong{color:var(--tx);font-weight:700}
.sp-bar{flex:1;height:5px;background:var(--bd);border-radius:100px;overflow:hidden}
.sp-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--ac),#7c3aed);border-radius:100px;transition:width .3s ease}
.sp-fill.hard-fill{background:linear-gradient(90deg,#7c3aed,#c026d3)}
.sp-ok{font-size:12px;font-weight:700;color:var(--gr);background:var(--gr-bg);border:1px solid var(--gr-bd);border-radius:100px;padding:2px 10px;white-space:nowrap}

/* ── RESULT BAR ── */
.rb{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:20px 22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:none}
.rb.show{display:block}
.rb-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.rb-score{font-size:38px;font-weight:800;line-height:1}
.rb-score.great{color:var(--gr)}.rb-score.ok{color:var(--ye)}.rb-score.low{color:var(--re)}
.rb-info{flex:1}
.rb-title{font-size:16px;font-weight:700;margin-bottom:3px}
.rb-sub{font-size:13px;color:var(--tx2)}
.rb-stats{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.rb-stat{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600}
.rb-dot{width:8px;height:8px;border-radius:50%}
.rb-acts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.rb-btn{padding:7px 18px;border-radius:100px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
.rb-retry{background:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(59,111,245,.25)}.rb-retry:hover{transform:translateY(-1px)}
.rb-retry-hard{background:linear-gradient(135deg,#7c3aed,#9d4edd);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.25)}.rb-retry-hard:hover{transform:translateY(-1px)}
.rb-clear{background:var(--s2);border:1.5px solid var(--bd2);color:var(--tx2)}.rb-clear:hover{border-color:var(--ac);color:var(--ac)}

/* ── SECTION HEADER ── */
.sec-hd{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px 12px 0 0;border:1px solid var(--bd);border-bottom:none;background:linear-gradient(to right,#f8fafc,#f1f5f9);margin-top:0}
.sec-hd.hard-hd{background:linear-gradient(to right,var(--pu-bg),#ede9fe);border-color:var(--pu-bd)}
.sec-icon{font-size:18px}
.sec-title{font-size:14px;font-weight:800;color:var(--tx);flex:1}
.sec-badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:100px}
.badge-blue{background:var(--ac-bg);color:var(--ac)}
.badge-purple{background:var(--pu-bg);color:var(--pu)}

/* ── Q LIST ── */
.ql{border:1px solid var(--bd);border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.ql.hard-list{border-color:var(--pu-bd)}
.qi{border-bottom:1px solid var(--bd);padding:16px 18px;background:var(--white);transition:background .15s}
.qi.hard-qi{border-bottom-color:var(--pu-bd)}
.qi:last-child{border-bottom:none}
.qi.done{background:var(--s2)}
.qi-hd{display:flex;align-items:flex-start;gap:9px;margin-bottom:9px}
.qn{min-width:30px;height:30px;border-radius:7px;background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tx2);flex-shrink:0;transition:all .15s}
.qn.ok{background:var(--gr-bg);border-color:var(--gr-bd);color:var(--gr)}
.qn.no{background:var(--re-bg);border-color:var(--re-bd);color:var(--re)}
.qi-tags{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tt{font-size:9px;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:.4px}
.dt{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px}
.dt.easy{background:var(--gr-bg);color:var(--gr);border:1px solid var(--gr-bd)}
.dt.medium{background:var(--ye-bg);color:var(--ye);border:1px solid #fde68a}
.dt.hard{background:var(--re-bg);color:var(--re);border:1px solid var(--re-bd)}
.freq{font-size:9px;font-weight:600;color:var(--or);background:var(--or-bg);border:1px solid var(--or-bd);padding:2px 6px;border-radius:4px}
.qt{font-size:14px;font-weight:600;color:var(--tx);line-height:1.55;margin-bottom:10px;padding-left:39px}
.og{display:flex;flex-direction:column;gap:5px;padding-left:39px}
.oi{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--white);cursor:pointer;transition:all .15s;font-size:13.5px;color:var(--tx2);line-height:1.45}
.oi:hover:not(.locked){border-color:var(--ac);background:var(--ac-bg);color:var(--tx)}
.ol{min-width:22px;height:22px;border-radius:5px;background:var(--s2);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--tx3);flex-shrink:0;transition:all .15s}
.oi.chosen{border-color:var(--ac);background:var(--ac-bg)}
.oi.chosen .ol{background:var(--ac);border-color:var(--ac);color:#fff}
.oi.correct{border-color:var(--gr);background:var(--gr-bg)}
.oi.correct .ol{background:var(--gr);border-color:var(--gr);color:#fff}
.oi.wrong{border-color:var(--re);background:var(--re-bg);opacity:.7}
.oi.wrong .ol{background:var(--re);border-color:var(--re);color:#fff}
.oi.locked{cursor:default}
.qf{margin-top:7px;padding:8px 13px;border-radius:8px;font-size:12.5px;display:none;align-items:flex-start;gap:7px;margin-left:39px}
.qf.show{display:flex;animation:fba .2s ease}
@keyframes fba{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.fb-ok{background:var(--gr-bg);border:1px solid var(--gr-bd);color:#14532d}
.fb-no{background:var(--re-bg);border:1px solid var(--re-bd);color:#7f1d1d}
.fi{font-size:13px;flex-shrink:0;margin-top:1px}

/* ── FLOAT SUBMIT ── */
.fs{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--white);border-top:1px solid var(--bd);padding:10px 16px;display:none;box-shadow:0 -3px 12px rgba(0,0,0,.07)}
.fs.show{display:block}
.fs-in{max-width:880px;margin:0 auto;display:flex;align-items:center;gap:12px}
.fs-txt{font-size:13px;color:var(--tx2);flex:1}.fs-txt strong{color:var(--tx)}
.fs-btn{padding:9px 22px;border-radius:100px;border:none;background:var(--ac);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 2px 8px rgba(59,111,245,.28);transition:all .15s;white-space:nowrap}
.fs-btn:hover{transform:translateY(-1px)}
.fs-btn.hard-fbtn{background:linear-gradient(135deg,#7c3aed,#9d4edd)}
.fs-x{padding:8px 14px;border-radius:100px;border:1.5px solid var(--bd2);background:transparent;color:var(--tx2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif}
.fs-x:hover{border-color:var(--ac);color:var(--ac)}

@media(max-width:560px){
  .cb-row{flex-wrap:wrap}
  .qt,.og,.qf{padding-left:0}
  .qi-hd{flex-wrap:wrap}
  .mode-tabs{gap:4px}
  .tab{padding:7px 12px;font-size:12px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<div class="ph">
  <h1>📚 Trắc Nghiệm Tin Học A</h1>
  <p>Tổng hợp từ 11 đề thi &amp; ngân hàng câu hỏi thực tế</p>
  <div class="ph-stats">
    <span>🟢 <strong>413</strong> câu ôn tập</span>
    <span>·</span>
    <span>🗂️ <strong>12</strong> chủ đề</span>
  </div>
</div>


<!-- ═══════ PANEL: NORMAL ═══════ -->
<div class="panel on" id="panel-normal">

  <div class="cb">
    <div class="cb-row">
      <span class="cb-lbl">Chủ đề</span>
      <div class="chips" id="topicChips"></div>
    </div>
    <div class="cb-row">
      <span class="cb-lbl">Số câu</span>
      <div class="cnt-row" id="cntRow">
        <button class="cnt on" data-n="50">50</button>
        <button class="cnt" data-n="25">25</button>
        <button class="cnt" data-n="15">15</button>
        <button class="cnt" data-n="0">Tất cả</button>
      </div>
      <div style="flex:1"></div>
      <button class="mix on" id="mxQ" onclick="toggleMix('mxQ','mixQ')"><span class="mix-dot" id="mxQd"></span>Trộn câu</button>
      <button class="mix on" id="mxA" onclick="toggleMix('mxA','mixA')"><span class="mix-dot" id="mxAd"></span>Trộn đáp án</button>
    </div>
  </div>

  <div class="sr">
    <button class="sbtn" id="startBtn" onclick="buildNormal()">▶ Bắt đầu làm bài</button>
    <div class="av" id="avail"></div>
  </div>

  <div id="normalResult"></div>
  <div id="normalArea"></div>
</div>


</div><!-- .wrap -->

<!-- STICKY PROGRESS -->
<div class="sp" id="sp">
  <div class="sp-in">
    <div class="sp-txt"><strong id="spD">0</strong> / <span id="spT">0</span></div>
    <div class="sp-bar"><div class="sp-fill" id="spF"></div></div>
    <div class="sp-ok">✓ <span id="spO">0</span></div>
  </div>
</div>

<!-- FLOAT SUBMIT -->
<div class="fs" id="fs">
  <div class="fs-in">
    <div class="fs-txt">Đã làm <strong id="fsD">0</strong> / <strong id="fsT">0</strong></div>
    <button class="fs-btn" id="fsBtnEl" onclick="submitCurrent()">Nộp bài &amp; xem kết quả</button>
    <button class="fs-x" onclick="document.getElementById('fs').classList.remove('show')">✕</button>
  </div>
</div>

};

/* ── INIT ── */
function init(){
  // Topic chips
  const tc={};EASY.forEach(q=>{tc[q.t]=(tc[q.t]||0)+1;});
  const g=document.getElementById('topicChips');
  const ab=mk('button','chip chip-all on');ab.dataset.t='ALL';ab.textContent='Tất cả';ab.onclick=()=>pickT('ALL');g.appendChild(ab);
  TOPICS.forEach(t=>{
    if(!tc[t])return;
    const b=mk('button','chip');b.dataset.t=t;
    b.innerHTML=`${TMAP[t].ico} ${t} <span style="opacity:.5;font-weight:400">${tc[t]}</span>`;
    b.onclick=()=>pickT(t);g.appendChild(b);
  });
  // Normal count
  document.querySelectorAll('#cntRow .cnt').forEach(b=>{
    b.onclick=()=>{document.querySelectorAll('#cntRow .cnt').forEach(x=>x.classList.remove('on'));b.classList.add('on');ST.cnt=parseInt(b.dataset.n)||0;upAvail();};
  });
  // Hard count
  document.querySelectorAll('#hCntRow .cnt').forEach(b=>{
    b.onclick=()=>{document.querySelectorAll('#hCntRow .cnt').forEach(x=>x.classList.remove('on'));b.classList.add('on');ST.hCnt=parseInt(b.dataset.n)||0;upHAvail();};
  });
  // Init dots green
  ['mxQd','mxAd','mxHd','mxHAd'].forEach(id=>document.getElementById(id).style.background='var(--gr)');
  upAvail();upHAvail();
}

function pickT(t){
  if(t==='ALL')ST.topics=new Set(['ALL']);
  else{ST.topics.delete('ALL');ST.topics.has(t)?ST.topics.delete(t):ST.topics.add(t);if(!ST.topics.size)ST.topics=new Set(['ALL']);}
  document.querySelectorAll('#topicChips .chip').forEach(b=>b.classList.toggle('on',ST.topics.has(b.dataset.t)));
  upAvail();
}
function pool(){return ST.topics.has('ALL')?EASY:EASY.filter(q=>ST.topics.has(q.t));}
function upAvail(){
  const p=pool(),n=ST.cnt===0?p.length:Math.min(ST.cnt,p.length);
  document.getElementById('avail').innerHTML=`<strong>${n}</strong> câu từ ${p.length} có sẵn`;
  document.getElementById('startBtn').disabled=!p.length;
}
function upHAvail(){
  const n=ST.hCnt===0?HARD.length:Math.min(ST.hCnt,HARD.length);
  document.getElementById('hAvail').innerHTML=`<strong>${n}</strong> / ${HARD.length} câu nâng cao`;
}
function toggleMix(id,key){
  const b=document.getElementById(id);b.classList.toggle('on');ST[key]=b.classList.contains('on');
  const dotMap={mxQ:'mxQd',mxA:'mxAd',mxH:'mxHd',mxHA:'mxHAd'};
  const dotId=dotMap[id];if(dotId)document.getElementById(dotId).style.background=ST[key]?'var(--gr)':'var(--bd2)';
}
function switchTab(mode){
  ST.mode=mode;
  document.getElementById('tab-normal').classList.toggle('on',mode==='normal');
  document.getElementById('tab-hard').classList.toggle('on',mode==='hard');
  document.getElementById('panel-normal').classList.toggle('on',mode==='normal');
  document.getElementById('panel-hard').classList.toggle('on',mode==='hard');
  // Update float btn color
  const fb=document.getElementById('fsBtnEl');
  if(mode==='hard')fb.classList.add('hard-fbtn');else fb.classList.remove('hard-fbtn');
  // Update progress bar
  document.getElementById('spF').className='sp-fill'+(mode==='hard'?' hard-fill':'');
}

/* ── SHUFFLE ── */
function rnd(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}
function mkOpts(q,shuffle){
  let o=[q.a,...(q.w||[]).slice(0,3)];
  o=[...new Set(o.filter(x=>x&&x.length>1))];
  while(o.length<2)o.push('Không xác định');
  return shuffle?rnd(o):o;
}

/* ── BUILD NORMAL ── */
function buildNormal(){
  let p=pool();if(ST.mixQ)p=rnd(p);
  const n=ST.cnt===0?p.length:Math.min(ST.cnt,p.length);
  ST.quiz=p.slice(0,n).map((q,i)=>{const e={...q,id:'q'+i,opts:mkOpts(q,ST.mixA)};ST.qmap[e.id]=e;return e;});
  ST.ans={};
  document.getElementById('normalResult').innerHTML='';
  const area=document.getElementById('normalArea');area.innerHTML='';
  area.appendChild(secHd('📝 Bài ôn tập',`${ST.quiz.length} câu`,'badge-blue',false));
  const l=mk('div','ql');ST.quiz.forEach((q,i)=>l.appendChild(qItem(q,i+1)));area.appendChild(l);
  setFloat(ST.quiz.length,'normal');
  document.getElementById('sp').classList.add('show');
  document.getElementById('spT').textContent=ST.quiz.length;
  upProg('normal');
  setTimeout(()=>area.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

/* ── BUILD HARD ── */
function buildHard(){
  let p=[...HARD];if(ST.mixH)p=rnd(p);
  const n=ST.hCnt===0?p.length:Math.min(ST.hCnt,p.length);
  ST.hquiz=p.slice(0,n).map((q,i)=>{const e={...q,id:'h'+i,opts:mkOpts(q,ST.mixHA)};ST.qmap[e.id]=e;return e;});
  ST.hans={};
  document.getElementById('hardResult').innerHTML='';
  const area=document.getElementById('hardArea');area.innerHTML='';
  area.appendChild(secHd('🔥 Câu hỏi nâng cao',`${ST.hquiz.length} câu`,'badge-purple',true));
  const l=mk('div','ql hard-list');ST.hquiz.forEach((q,i)=>l.appendChild(qItem(q,i+1,true)));area.appendChild(l);
  setFloat(ST.hquiz.length,'hard');
  document.getElementById('sp').classList.add('show');
  document.getElementById('spT').textContent=ST.hquiz.length;
  upProg('hard');
  setTimeout(()=>area.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function setFloat(total,mode){
  document.getElementById('fs').classList.add('show');
  document.getElementById('fsT').textContent=total;
  document.getElementById('fsD').textContent=0;
  const fb=document.getElementById('fsBtnEl');
  if(mode==='hard')fb.classList.add('hard-fbtn');else fb.classList.remove('hard-fbtn');
}

/* ── RENDER ── */
function secHd(title,sub,bc,isHard){
  const d=mk('div','sec-hd'+(isHard?' hard-hd':''));
  const ico=title.split(' ')[0];const txt=title.replace(/^[^\s]+\s/,'');
  d.innerHTML=`<span class="sec-icon">${ico}</span><span class="sec-title">${txt}</span><span class="sec-badge ${bc}">${sub}</span>`;
  return d;
}
function qItem(q,num,isHard=false){
  const ti=TMAP[q.t]||{c:'#64748b',bg:'#f8fafc',ico:'📚'};
  const d=mk('div','qi'+(isHard?' hard-qi':''));d.id='item-'+q.id;
  const fq=q.c>=3?`<span class="freq">×${q.c}</span>`:'';
  const oh=q.opts.map((o,i)=>`<div class="oi" id="oi-${q.id}-${i}" onclick="pick('${q.id}',${i})"><span class="ol">${LTRS[i]}</span><span>${esc(o)}</span></div>`).join('');
  d.innerHTML=`<div class="qi-hd"><div class="qn" id="qn-${q.id}">${num}</div><div class="qi-tags"><span class="tt" style="background:${ti.bg};color:${ti.c};border:1px solid ${ti.c}30">${ti.ico} ${q.t}</span><span class="dt ${DC[q.d]||'medium'}">${DM[q.d]||'TB'}</span>${fq}</div></div><div class="qt">${esc(q.q)}</div><div class="og">${oh}</div><div class="qf" id="qf-${q.id}"><span class="fi" id="fi-${q.id}"></span><div id="ft-${q.id}"></div></div>`;
  return d;
}

/* ── PICK ── */
function pick(qid,idx){
  const q=ST.qmap[qid];if(!q)return;
  const f=document.getElementById(`oi-${qid}-0`);if(f&&f.classList.contains('locked'))return;
  const chosen=q.opts[idx];const ok=chosen.trim().toLowerCase()===q.a.trim().toLowerCase();
  const isHard=qid.startsWith('h');
  if(isHard)ST.hans[qid]={idx,text:chosen,ok};else ST.ans[qid]={idx,text:chosen,ok};
  q.opts.forEach((_,i)=>{
    const el=document.getElementById(`oi-${qid}-${i}`);if(!el)return;
    el.classList.add('locked');
    const isC=q.opts[i].trim().toLowerCase()===q.a.trim().toLowerCase();
    if(i===idx)el.classList.add(ok?'correct':'wrong');else if(isC)el.classList.add('correct');
  });
  const nb=document.getElementById(`qn-${qid}`);if(nb)nb.className='qn '+(ok?'ok':'no');
  const item=document.getElementById(`item-${qid}`);if(item)item.classList.add('done');
  const fb=document.getElementById(`qf-${qid}`),fi=document.getElementById(`fi-${qid}`),ft=document.getElementById(`ft-${qid}`);
  if(fb&&fi&&ft){fb.className='qf show '+(ok?'fb-ok':'fb-no');fi.textContent=ok?'✅':'❌';ft.innerHTML=ok?'<strong>Chính xác!</strong>':`<strong>Chưa đúng.</strong> Đáp án: <strong>${esc(q.a)}</strong>`;}
  upProg(isHard?'hard':'normal');
}

/* ── PROGRESS ── */
function upProg(mode){
  const isHard=mode==='hard';
  const quiz=isHard?ST.hquiz:ST.quiz;
  const ansMap=isHard?ST.hans:ST.ans;
  const prefix=isHard?'h':'q';
  const qa=Object.entries(ansMap).filter(([k])=>k.startsWith(prefix));
  const done=qa.length,ok=qa.filter(([,a])=>a.ok).length;
  document.getElementById('spD').textContent=done;
  document.getElementById('spT').textContent=quiz.length;
  document.getElementById('spF').style.width=quiz.length?`${done/quiz.length*100}%`:'0%';
  document.getElementById('spO').textContent=ok;
  document.getElementById('fsD').textContent=done;
  document.getElementById('fsT').textContent=quiz.length;
}

/* ── SUBMIT ── */
function submitCurrent(){
  if(ST.mode==='hard')submitQuiz('hard');else submitQuiz('normal');
}
function submitQuiz(mode){
  const isHard=mode==='hard';
  const quiz=isHard?ST.hquiz:ST.quiz;
  if(!quiz.length)return;
  const prefix=isHard?'h':'q';
  const ansMap=isHard?ST.hans:ST.ans;
  const qa=Object.entries(ansMap).filter(([k])=>k.startsWith(prefix));
  const total=quiz.length,ok=qa.filter(([,a])=>a.ok).length,no=qa.filter(([,a])=>!a.ok).length,skip=total-qa.length;
  const score=(total?ok/total*10:0).toFixed(1),pct=total?ok/total:0;
  const resId=isHard?'hardResult':'normalResult';
  const res=document.getElementById(resId);
  const scoreClass=pct>=.7?'great':pct>=.5?'ok':'low';
  const M=[[.9,'🏆 Xuất sắc!','Bạn đã thành thạo!'],[.8,'🎉 Giỏi lắm!','Kết quả rất ấn tượng!'],[.7,'✅ Đạt mục tiêu!','Đã vượt ngưỡng 7 điểm!'],[.6,'📈 Đạt yêu cầu','Cần ôn kỹ hơn.'],[.5,'⚡ Sắp qua rồi!','Tiếp tục để vượt 6 điểm.'],[0,'📚 Cần cố gắng','Hãy ôn lại và thử lại nhé!']];
  const [,t,s]=M.find(([th])=>pct>=th);
  const retryClass=isHard?'rb-retry-hard':'rb-retry';
  const retryFn=isHard?'buildHard()':'buildNormal()';
  res.innerHTML=`<div class="rb show"><div class="rb-top"><div class="rb-score ${scoreClass}">${score}</div><div class="rb-info"><div class="rb-title">${t}</div><div class="rb-sub">${ok}/${total} câu đúng — ${s}</div></div></div><div class="rb-stats"><div class="rb-stat"><div class="rb-dot" style="background:var(--gr)"></div>${ok} đúng</div><div class="rb-stat"><div class="rb-dot" style="background:var(--re)"></div>${no} sai</div><div class="rb-stat"><div class="rb-dot" style="background:var(--tx3)"></div>${skip} bỏ qua</div></div><div class="rb-acts"><button class="rb-btn ${retryClass}" onclick="${retryFn}">🔄 Làm lại</button><button class="rb-btn rb-clear" onclick="clearMode('${mode}')">🗑️ Xóa đáp án</button></div></div>`;
  document.getElementById('fs').classList.remove('show');
  res.scrollIntoView({behavior:'smooth',block:'start'});
}
function clearMode(mode){if(mode==='hard')buildHard();else buildNormal();}

/* ── UTILS ── */
function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── BOOT ── */
init();
</script>
</body>
</html>
